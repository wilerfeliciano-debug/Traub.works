<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TRAUB - Alinhador Profissional</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0">

<style>
body {
  font-family: Consolas, monospace;
  background: #111;
  color: #0f0;
  padding: 10px;
}

.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

textarea {
  width: 100%;
  height: 700px;
  background: #000;
  color: #0f0;
  border: 1px solid #333;
  padding: 10px;
  resize: none;
  overflow: auto;

  font-size: 14px;
  line-height: 18px;
  white-space: pre;
}

button {
  margin-right: 10px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<h2>TRAUB - Alinhador Profissional</h2>

<button onclick="alinhar()">Alinhar Sincronismo</button>
<button onclick="salvarTXT()">Exportar .TXT</button>
<button onclick="salvarPrograma()">Salvar Programa</button>

<div class="container">
  <textarea id="s1"></textarea>
  <textarea id="s2"></textarea>
  <textarea id="s3"></textarea>
  <textarea id="s4"></textarea>
</div>

<script>

const areas = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3"),
  document.getElementById("s4")
];

// 🔥 CARREGAR SALVO
window.onload = () => {
  let salvo = localStorage.getItem("traub_programa");
  if (salvo) {
    let dados = JSON.parse(salvo);
    areas.forEach((a, i) => a.value = dados[i] || "");
  }
};

// 🔥 SCROLL SINCRONIZADO
let travado = false;

areas.forEach(area => {
  area.addEventListener("scroll", () => {
    if (travado) return;
    travado = true;

    areas.forEach(a => {
      if (a !== area) {
        a.scrollTop = area.scrollTop;
        a.scrollLeft = area.scrollLeft;
      }
    });

    travado = false;
  });
});

// 🔥 ALINHAR (RESET CORRETO)
function alinhar() {

  // 🔥 limpa linhas vazias (resolve bug de alinhar 1x só)
  let sistemas = areas.map(a =>
    a.value.split("\n").filter(l => l.trim() !== "")
  );

  let lista = [];

  sistemas.forEach((linhas, sIndex) => {
    linhas.forEach((linha, i) => {

      let match = linha.trim().match(/^N\d+!([\d!]+)$/);
      if (!match) return;

      let destinos = match[1].split("!").map(Number);
      let origem = sIndex + 1;

      lista.push({ origem, destinos, linha: i });

    });
  });

  lista.sort((a, b) => a.linha - b.linha);

  lista.forEach(item => {

    let envolvidos = [item.origem, ...item.destinos];

    let posicoes = [];

    envolvidos.forEach(s => {

      let linhas = sistemas[s - 1];
      let idx = linhas.findIndex(l => l.includes("!"));

      if (idx !== -1) {
        posicoes.push({ sistema: s, linha: idx });
      }

    });

    if (posicoes.length < 2) return;

    let linhaAlvo = Math.max(...posicoes.map(p => p.linha));

    posicoes.forEach(p => {

      let dif = linhaAlvo - p.linha;

      if (dif > 0) {
        for (let i = 0; i < dif; i++) {
          sistemas[p.sistema - 1].splice(p.linha, 0, "");
        }
      }

    });

  });

  sistemas.forEach((linhas, i) => {
    areas[i].value = linhas.join("\n");
  });

}

// 🔥 EXPORTAR TXT
function salvarTXT() {

  alinhar();

  let conteudo = "";

  areas.forEach((area, i) => {

    let linhas = area.value.split("\n");
    let limpo = linhas.filter(l => l.trim() !== "");

    conteudo += `===== SISTEMA ${i + 1} =====\n`;
    conteudo += limpo.join("\n") + "\n\n";

  });

  let blob = new Blob([conteudo], { type: "text/plain" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "programa_traub.txt";
  link.click();
}

// 🔥 SALVAR PROGRAMA
function salvarPrograma() {

  let dados = areas.map(a => a.value);
  localStorage.setItem("traub_programa", JSON.stringify(dados));

  alert("Programa salvo!");
}

// 🔥 SERVICE WORKER (PWA OFFLINE)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("SW ativo"))
    .catch(err => console.log("Erro SW:", err));
}

</script>

</body>
</html>
